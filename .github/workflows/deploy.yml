name: Deploy Foot Traffic Analyzer to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'azd environment name'
        required: true
        default: 'prod'

env:
  AZURE_ENV_NAME: ${{ github.event.inputs.environment || 'prod' }}
  AZURE_LOCATION: eastus2
  PYTHON_VERSION: '3.11'

# NOTE: Azure OpenAI and Synapse are provisioned by Bicep automatically.
# The ONLY required GitHub secret is AZURE_CREDENTIALS (service principal).
# No OpenAI keys or Synapse passwords need to be stored as secrets.

jobs:
  # ─── Lint & Test ────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 black pytest pytest-cov
          pip install -r functions/requirements.txt
          pip install -r streamlit_app/requirements.txt

      - name: Lint (flake8)
        run: |
          flake8 functions/ streamlit_app/ \
            --max-line-length=120 \
            --exclude=.python_packages,__pycache__ \
            --ignore=E501,W503

      - name: Format check (black)
        run: black --check --line-length=120 functions/ streamlit_app/

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/integration || echo "No tests yet — skipping"

  # ─── Provision + Deploy (azd up) ────────────────────────────────────────────
  deploy:
    name: azd up
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Install azd ──────────────────────────────────────────────────────────
      - name: Install Azure Developer CLI
        uses: azure/setup-azd@v1

      # ── Install sqlcmd (for postprovision schema init) ────────────────────────
      - name: Install sqlcmd
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> "$GITHUB_PATH"

      # ── Log in to Azure ───────────────────────────────────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Authenticate azd ─────────────────────────────────────────────────────
      - name: azd auth login
        run: azd auth login --use-device-code=false
        env:
          AZURE_CLIENT_ID:     ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          AZURE_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          AZURE_TENANT_ID:     ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

      # ── Configure azd environment ─────────────────────────────────────────────
      # Only location and optional video feeds — no API keys or passwords needed.
      # Bicep provisions OpenAI and generates the Synapse password automatically.
      - name: Configure azd environment
        run: |
          azd env new "${{ env.AZURE_ENV_NAME }}" --no-prompt 2>/dev/null || true
          azd env set AZURE_LOCATION   "${{ env.AZURE_LOCATION }}"
          # Optional: override video feed URLs
          if [[ -n "${{ secrets.VIDEO_FEED_URLS }}" ]]; then
            azd env set VIDEO_FEED_URLS "${{ secrets.VIDEO_FEED_URLS }}"
          fi
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}

      # ── azd up: provision (OpenAI + Synapse + all infra) + deploy + hooks ─────
      - name: azd up
        run: azd up --no-prompt
        env:
          AZURE_ENV_NAME:        ${{ env.AZURE_ENV_NAME }}
          AZURE_LOCATION:        ${{ env.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          AZURE_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
          AZURE_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          AZURE_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}

      # ── Print deployed URLs ───────────────────────────────────────────────────
      - name: Show deployed endpoints
        run: azd show
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}

      # ── Deployment summary ────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          STREAMLIT_URL=$(azd env get-values 2>/dev/null \
            | grep SERVICE_STREAMLIT_DASHBOARD_URI \
            | cut -d= -f2 | tr -d '"' || echo "see: azd show")

          OPENAI_ENDPOINT=$(azd env get-values 2>/dev/null \
            | grep AZURE_OPENAI_ENDPOINT \
            | cut -d= -f2 | tr -d '"' || echo "see: azd env list")

          echo "## 🎉 Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All resources provisioned by Bicep — no pre-created services needed." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure OpenAI (GPT-4o) | ✅ Provisioned by Bicep |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure Synapse Analytics | ✅ Provisioned by Bicep |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure Functions (Container App) | ✅ Deployed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Streamlit Container App | ✅ Deployed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Database Schema | ✅ Initialized |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secrets in Key Vault | ✅ Auto-populated by Bicep |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Dashboard:** $STREAMLIT_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**OpenAI Endpoint:** $OPENAI_ENDPOINT" >> "$GITHUB_STEP_SUMMARY"
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}

  # ─── PR Info Comment ─────────────────────────────────────────────────────────
  pr-comment:
    name: PR Info
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🔍 PR Checks Passed',
                '',
                '✅ Lint & tests passed.',
                '',
                'This PR will be deployed to Azure automatically when merged to `main` via `azd up`.',
                '',
                '**Azure OpenAI and Synapse are provisioned by Bicep** — no pre-created resources needed.',
                '',
                '**Required GitHub Secret (only one!):**',
                '- `AZURE_CREDENTIALS` — Service principal JSON (`az ad sp create-for-rbac --sdk-auth`)',
                '',
                '**Optional GitHub Secret:**',
                '- `VIDEO_FEED_URLS` — Custom video feed URLs (has sensible defaults)',
              ].join('\n')
            })
